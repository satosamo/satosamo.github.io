# ============================================================
#  order.yaml — the one file that controls the map of the site
# ============================================================
#  Each key is a folder path under src/content/ ("" = homepage).
#  For every folder you can set:
#    title:  display name of that section
#    glyph:  name of an SVG in src/_includes/glyphs/ (no .svg)
#    blurb:  one-line description shown on its tile + page
#    order:  the order of tiles inside it (folder or file slugs).
#            Anything not listed appears after, alphabetically.
#
#  Moving "differential-forms" above "vector-fields" is literally
#  swapping two lines below. Folders you haven't configured still
#  work — they get a prettified name and alphabetical order.
# ------------------------------------------------------------

"":
  title: Compendium
  order:
    - mathematics
    - physics
    - computer-science
    - chemistry
    - masters-thesis
    - research
    - mobility
    - languages

mathematics:
  title: Mathematics
  glyph: integral
  blurb: Articles and coursework, from algebra to differential geometry.
  order:
    - articles
    - coursework

mathematics/articles:
